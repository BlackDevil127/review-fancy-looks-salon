/* ================= LOGIC ================= */

function showReview(){
    const r = reviews[Math.floor(Math.random()*reviews.length)];
    document.getElementById("review-output").innerText = r.text;
    document.getElementById("language").innerText = "ভাষা: " + r.lang;
    document.getElementById("price").innerText = "মূল্য পরিসর: " + r.price;
}

function copyReview(){
    const text = document.getElementById("review-output").innerText
                  .replace(/⭐️/g,"").trim();

    const link="https://search.google.com/local/writereview?placeid=ChIJCXFIo3ud-DkRpwnRAyAT3mY";

    window.open(link,"_blank");

    navigator.clipboard.writeText(text)
    .then(()=>alert("✅ রিভিউ কপি হয়েছে"))
    .catch(()=>{
        const t=document.createElement("textarea");
        t.value=text;
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);
        alert("✅ রিভিউ কপি হয়েছে");
    });
}

document.addEventListener("DOMContentLoaded",()=>{
    showReview();
    document.getElementById("copy-button").onclick=copyReview;
});
